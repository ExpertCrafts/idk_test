</head>

  <p class="maintitle">ExpertCrafts Texture Packs</p>

    <!-- Title, Text on Top -->

          <div class="circle redcircle" id="bottom"></div>
        </div>
        <div class="front-content">
          <div class="gui" style="background-image: url(https://iili.io/C3jUpxs.png);"></div>
          <div class="description">
            <div class="title">

              <p class="title">
                <strong>Expfault V1 (Bloxd)</strong>
              </p>

          <div class="circle limecircle"></div>
          <div class="circle limecircle" id="right"></div>
          <div class="circle limecircle" id="bottom"></div>
        </div>

          <div class="gui" style="background-image: url(https://iili.io/CF1OEgt.png); background-size: 10rem; opacity: 0.75;"></div>

<script>
        function downloadFile(filePath, fileName) {
            const link = document.createElement('a');
            link.href = filePath;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    
</script>
